name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-e2e:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: '20'

    # 1. Start the Backend Server in the background
    - name: Install & Start Backend
      working-directory: ./backend
      run: |
        npm install
        npm run start &
        sleep 5

    # 2. Start the Frontend Server in the background
    - name: Install & Start Frontend
      working-directory: ./frontend
      run: |
        npm install
        npm run dev &
        sleep 5

    # 3. Install the automated browsers
    - name: Install Playwright Browsers
      working-directory: ./frontend
      run: npx playwright install --with-deps

    # 4. Run the tests
    - name: Run Playwright tests
      working-directory: ./frontend
      run: npx playwright test

    # 5. Save the report if it fails so you can see what went wrong
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: frontend/playwright-report/
        retention-days: 30