name: Automated API Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Backend tests
  test-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies & Start Server
        working-directory: ./backend
        run: |
          npm install
          npm run start &  
          sleep 5          

      - name: Install Newman
        run: npm install -g newman

      - name: Run All Postman Collections
        working-directory: ./postman-tests
        run: |
          for file in *.json; do
            # Skip the environment file so it doesn't try to run it as a test
            if [[ "$file" != "baller-environment.json" && "$file" != "package"* ]]; then
              echo "Running $file..."
              newman run "$file" -e baller-environment.json
            fi
          done

  # Front end tests 
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm install

      - name: Run Vitest Tests
        working-directory: ./frontend
        run: npx vitest run